<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="840" viewBox="0 0 1400 840" role="img" aria-label="Product quantization simulation">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#edf3ff" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1400" height="840" fill="url(#bg)" />
  <text x="70" y="72" font-size="34" font-family="Inter, Arial, sans-serif" font-weight="700" fill="#111827">Product Quantization Simulation</text>
  <text x="70" y="104" font-size="19" font-family="Inter, Arial, sans-serif" fill="#334155">Split vector into subspaces, quantize each subspace, store compact codes.</text>
  <rect x="70" y="150" width="1260" height="620" rx="20" fill="#ffffff" stroke="#ccd9ec" stroke-width="1.5" />
  <rect x="120" y="220" width="85" height="70" rx="8" fill="#2563eb" fill-opacity="0.85" />
  <text x="162.5" y="262" text-anchor="middle" font-size="16" font-family="Inter, Arial, sans-serif" fill="#ffffff" font-weight="700">s1</text>
  <rect x="213" y="220" width="85" height="70" rx="8" fill="#7c3aed" fill-opacity="0.85" />
  <text x="255.5" y="262" text-anchor="middle" font-size="16" font-family="Inter, Arial, sans-serif" fill="#ffffff" font-weight="700">s2</text>
  <rect x="306" y="220" width="85" height="70" rx="8" fill="#0ea5e9" fill-opacity="0.85" />
  <text x="348.5" y="262" text-anchor="middle" font-size="16" font-family="Inter, Arial, sans-serif" fill="#ffffff" font-weight="700">s3</text>
  <rect x="399" y="220" width="85" height="70" rx="8" fill="#16a34a" fill-opacity="0.85" />
  <text x="441.5" y="262" text-anchor="middle" font-size="16" font-family="Inter, Arial, sans-serif" fill="#ffffff" font-weight="700">s4</text>
  <rect x="492" y="220" width="85" height="70" rx="8" fill="#f59e0b" fill-opacity="0.85" />
  <text x="534.5" y="262" text-anchor="middle" font-size="16" font-family="Inter, Arial, sans-serif" fill="#ffffff" font-weight="700">s5</text>
  <rect x="585" y="220" width="85" height="70" rx="8" fill="#ef4444" fill-opacity="0.85" />
  <text x="627.5" y="262" text-anchor="middle" font-size="16" font-family="Inter, Arial, sans-serif" fill="#ffffff" font-weight="700">s6</text>
  <rect x="678" y="220" width="85" height="70" rx="8" fill="#14b8a6" fill-opacity="0.85" />
  <text x="720.5" y="262" text-anchor="middle" font-size="16" font-family="Inter, Arial, sans-serif" fill="#ffffff" font-weight="700">s7</text>
  <rect x="771" y="220" width="85" height="70" rx="8" fill="#8b5cf6" fill-opacity="0.85" />
  <text x="813.5" y="262" text-anchor="middle" font-size="16" font-family="Inter, Arial, sans-serif" fill="#ffffff" font-weight="700">s8</text>
  <text x="120" y="198" font-size="18" font-family="Inter, Arial, sans-serif" fill="#0f172a" font-weight="700">Original vector (example: 768 dims)</text>
  <text x="120" y="324" font-size="15" font-family="Inter, Arial, sans-serif" fill="#475569">Split into m = 8 subspaces, each quantized independently.</text>
  <text x="120" y="364" font-size="18" font-family="Inter, Arial, sans-serif" fill="#0f172a" font-weight="700">Codebooks (k = 256 centroids each)</text>
  <rect x="120" y="390" width="150" height="56" rx="8" fill="#f8fbff" stroke="#cbd8ea" stroke-width="1.2" />
  <text x="132" y="423" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">subspace s1 -> c1</text>
  <rect x="290" y="390" width="150" height="56" rx="8" fill="#f8fbff" stroke="#cbd8ea" stroke-width="1.2" />
  <text x="302" y="423" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">subspace s2 -> c2</text>
  <rect x="460" y="390" width="150" height="56" rx="8" fill="#f8fbff" stroke="#cbd8ea" stroke-width="1.2" />
  <text x="472" y="423" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">subspace s3 -> c3</text>
  <rect x="630" y="390" width="150" height="56" rx="8" fill="#f8fbff" stroke="#cbd8ea" stroke-width="1.2" />
  <text x="642" y="423" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">subspace s4 -> c4</text>
  <rect x="120" y="468" width="150" height="56" rx="8" fill="#f8fbff" stroke="#cbd8ea" stroke-width="1.2" />
  <text x="132" y="501" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">subspace s5 -> c5</text>
  <rect x="290" y="468" width="150" height="56" rx="8" fill="#f8fbff" stroke="#cbd8ea" stroke-width="1.2" />
  <text x="302" y="501" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">subspace s6 -> c6</text>
  <rect x="460" y="468" width="150" height="56" rx="8" fill="#f8fbff" stroke="#cbd8ea" stroke-width="1.2" />
  <text x="472" y="501" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">subspace s7 -> c7</text>
  <rect x="630" y="468" width="150" height="56" rx="8" fill="#f8fbff" stroke="#cbd8ea" stroke-width="1.2" />
  <text x="642" y="501" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">subspace s8 -> c8</text>
  <rect x="120" y="546" width="150" height="56" rx="8" fill="#f8fbff" stroke="#cbd8ea" stroke-width="1.2" />
  <text x="132" y="579" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">subspace s1 -> c9</text>
  <rect x="290" y="546" width="150" height="56" rx="8" fill="#f8fbff" stroke="#cbd8ea" stroke-width="1.2" />
  <text x="302" y="579" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">subspace s2 -> c10</text>
  <rect x="460" y="546" width="150" height="56" rx="8" fill="#f8fbff" stroke="#cbd8ea" stroke-width="1.2" />
  <text x="472" y="579" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">subspace s3 -> c11</text>
  <rect x="630" y="546" width="150" height="56" rx="8" fill="#f8fbff" stroke="#cbd8ea" stroke-width="1.2" />
  <text x="642" y="579" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">subspace s4 -> c12</text>
  <rect x="120" y="624" width="150" height="56" rx="8" fill="#f8fbff" stroke="#cbd8ea" stroke-width="1.2" />
  <text x="132" y="657" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">subspace s5 -> c13</text>
  <rect x="290" y="624" width="150" height="56" rx="8" fill="#f8fbff" stroke="#cbd8ea" stroke-width="1.2" />
  <text x="302" y="657" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">subspace s6 -> c14</text>
  <rect x="460" y="624" width="150" height="56" rx="8" fill="#f8fbff" stroke="#cbd8ea" stroke-width="1.2" />
  <text x="472" y="657" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">subspace s7 -> c15</text>
  <rect x="630" y="624" width="150" height="56" rx="8" fill="#f8fbff" stroke="#cbd8ea" stroke-width="1.2" />
  <text x="642" y="657" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">subspace s8 -> c16</text>
  <line x1="760" y1="575" x2="920" y2="575" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"></path>
    </marker>
  </defs>
  <text x="782" y="550" font-size="15" font-family="Inter, Arial, sans-serif" fill="#334155">store indices</text>
  <rect x="950" y="260" width="310" height="410" rx="14" fill="#f8fbff" stroke="#c9d6ea" stroke-width="1.5" filter="url(#shadow)" />
  <text x="970" y="296" font-size="20" font-family="Inter, Arial, sans-serif" fill="#0f172a" font-weight="700">Compressed code</text>
  <text x="970" y="328" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">[12, 201, 7, 44, 99, 3, 221, 56]</text>
  <line x1="970" y1="346" x2="1236" y2="346" stroke="#d8e2f0" stroke-width="1" />
  <text x="970" y="382" font-size="15" font-family="Inter, Arial, sans-serif" fill="#0f172a" font-weight="700">Memory example</text>
  <text x="970" y="412" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">Raw vector: 768 x 4 = 3072 bytes</text>
  <text x="970" y="438" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">PQ code: 8 bytes (8 x 1 byte)</text>
  <text x="970" y="464" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">Compression: 384x smaller</text>
  <line x1="970" y1="488" x2="1236" y2="488" stroke="#d8e2f0" stroke-width="1" />
  <text x="970" y="522" font-size="15" font-family="Inter, Arial, sans-serif" fill="#0f172a" font-weight="700">Query-time distance</text>
  <text x="970" y="550" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">1. Build lookup table per subspace</text>
  <text x="970" y="576" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">2. Read centroid indices</text>
  <text x="970" y="602" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">3. Sum lookup distances</text>
  <text x="970" y="628" font-size="14" font-family="Inter, Arial, sans-serif" fill="#334155">4. Rerank top candidates</text>
</svg>